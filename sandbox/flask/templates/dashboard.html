<!DOCTYPE html>
<html lang="en">
<head>
    <!-- <link rel="stylesheet" href="style.css"> -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Profile Dashboard</title>
</head>
<body>

    <div class="container">
        <header>
            <h1>User Dashboard</h1>
            <form method="POST" action="{{ url_for('logout') }}">
                <button type="submit">Logout</button>
            </form>
        </header>

        <div class="profile-info">
            <img src="{{ url_for('static', filename='images/image2.jpg') }}" alt="Profile Picture">
            <div class="details">
                <h2>Welcome {{ username }} </h2>
                <!-- <p>Email: {{ email }}</p> -->
                <p>Location: New York, USA</p>
            </div>
        </div>

        <div class="stats">
            <div class="stat">
                <h3>45</h3>
                <p>Posts</p>
            </div>
            <div class="stat">
                <h3>102</h3>
                <p>Followers</p>
            </div>
            <div class="stat">
                <h3>8</h3>
                <p>Following</p>
            </div>
        </div>
    </div>

</body>
</html>
